<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1000" height="750" fill="#f4f1ea"/>
  <rect x="150" y="30" width="700" height="906" fill="#ffffff" stroke="#d8d4c8" stroke-width="1"/>
  
  <!-- Springer Journal Header -->
  <g fill="#333333" font-size="14">
    <text x="190" y="70">Moskovitz et al. <tspan font-style="italic">Journal of Electric Propulsion</tspan> (2026) 5:32</text>
    <text x="810" y="70" text-anchor="end" font-weight="bold" font-size="16">Journal of Electric Propulsion</text>
  </g>
  
  <rect x="190" y="90" width="620" height="30" fill="#a4c2d6" rx="4"/> <!-- Springer blue banner -->
  <text x="200" y="111" fill="#222222" font-size="18" font-weight="bold">RESEARCH</text>
  <text x="800" y="111" fill="#222222" font-size="18" font-weight="bold" text-anchor="end">Open Access</text>

  <!-- Title -->
  <g text-anchor="start" fill="#111111">
    <text x="190" y="170" font-size="32">Performance comparison and analysis of low-</text>
    <text x="190" y="215" font-size="32">power hall thruster operation on atomic</text>
    <text x="190" y="260" font-size="32">and molecular propellants</text>
  </g>

  <!-- Authors -->
  <text x="190" y="310" font-size="15" fill="#333333">Joseph A. Moskovitz, Maxim Rubanovich, William P. Brabston, Dan Lev,</text>
  <text x="190" y="335" font-size="15" fill="#333333">Mitchell L. R. Walker and Vladimir Balabanov</text>

  <!-- Abstract Box -->
  <rect x="350" y="370" width="460" height="330" fill="#fcfcfc" stroke="#dddddd" stroke-width="1" rx="8"/>
  <text x="370" y="405" font-size="17" font-weight="bold" fill="#222222">Abstract</text>
  
  <g fill="#cccccc">
    <rect x="370" y="430" width="420" height="8" rx="4"/>
    <rect x="370" y="450" width="420" height="8" rx="4"/>
    <rect x="370" y="470" width="420" height="8" rx="4"/>
    <rect x="370" y="490" width="420" height="8" rx="4"/>
    <rect x="370" y="510" width="420" height="8" rx="4"/>
    <rect x="370" y="530" width="420" height="8" rx="4"/>
    <rect x="370" y="550" width="420" height="8" rx="4"/>
    <rect x="370" y="570" width="420" height="8" rx="4"/>
    <rect x="370" y="590" width="420" height="8" rx="4"/>
    <rect x="370" y="610" width="420" height="8" rx="4"/>
    <rect x="370" y="630" width="420" height="8" rx="4"/>
    <rect x="370" y="650" width="280" height="8" rx="4"/>
  </g>

  <!-- Small text on left side like affiliations -->
  <g fill="#cccccc">
    <rect x="190" y="370" width="120" height="5" rx="2.5"/>
    <rect x="190" y="382" width="120" height="5" rx="2.5"/>
    <rect x="190" y="394" width="120" height="5" rx="2.5"/>
    <rect x="190" y="406" width="100" height="5" rx="2.5"/>
    <rect x="190" y="430" width="120" height="5" rx="2.5"/>
    <rect x="190" y="442" width="120" height="5" rx="2.5"/>
    <rect x="190" y="454" width="80" height="5" rx="2.5"/>
  </g>
</svg>
