<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Culture | JamgatechANRE</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body class="culture-page">
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">Joseph Moskovitz<span class="dot">.</span></a>
      <div class="links">
        <a href="index.html">about</a>
        <a href="work.html">work</a>
        <a href="cv.html">cv</a>
        <a href="news.html">news</a>
        <a href="timeline.html">timeline</a>
        <a href="travel.html">travel</a>
        <a href="culture.html" class="active">culture</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="culture-section spotify-section">
      <h2>Music</h2>
      <p>My current heavy rotation and all-time favorites.</p>
      <!-- Spotify Embed -->
      <div class="spotify-embed-wrapper">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4nDfLtlyOQO6aQhLZRHuA6?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
      </div>
    </section>

    <section class="culture-section media-section">
      <h2>Reading & Watching</h2>
      <p>Favorite books and TV shows.</p>
      <div class="media-container" id="books-container">
        <!-- Books will be populated here by JS -->
        <p style="color: #6a82a0; font-style: italic;">Add your favorite books and TV shows to data/culture.js!</p>
      </div>
    </section>

    <section class="culture-section restaurants-section">
      <h2>Favorite Restaurants</h2>
      <div class="restaurants-grid" id="restaurants-grid">
        <!-- Restaurants will be populated here by JS -->
      </div>
    </section>
  </main>

  <script src="data/culture.js"></script>
  <script>
    // Populate Restaurants
    const grid = document.getElementById('restaurants-grid');
    RESTAURANTS.forEach(r => {
      const el = document.createElement('div');
      el.className = 'restaurant-card';
      el.innerHTML = `
        <div class="restaurant-map">
          <iframe 
            src="${r.mapUrl}" 
            width="100%" 
            height="100%" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
        <div class="restaurant-info">
          <h3>${r.name}</h3>
          <span class="restaurant-location">${r.location}</span>
        </div>
      `;
      grid.appendChild(el);
    });
  </script>
  <script src="assets/site.js"></script>
</body>
</html>
