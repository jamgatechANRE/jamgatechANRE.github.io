  <script src="data/news.js"></script>
  <script>
    const list = document.getElementById("news-list");
    for (const n of NEWS) {
      const li = document.createElement("li");
      li.className = "reveal";
      const thumb = n.img
        ? `<a class="news-thumb" href="${n.url}" target="_blank" rel="noopener"><img src="${n.img}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></a>`
        : "";
      li.innerHTML = `
        <div class="when"><span class="outlet">${n.outlet}</span>${n.date}</div>
        ${thumb}
        <div>
          <div class="news-title"><a href="${n.url}" target="_blank" rel="noopener">${n.title}</a></div>
          <p class="news-desc">${n.desc}</p>
        </div>`;
      if (!n.img) li.classList.add("no-thumb");
      list.appendChild(li);
    }
  </script>
