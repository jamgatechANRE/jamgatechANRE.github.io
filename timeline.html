  <script>
    (function () {
      const wrap = document.getElementById("tl-wrap");
      const tip = document.getElementById("tl-tip");
      // forced on, like the site-wide canvas animations in assets/site.js —
      // Windows' "reduced motion" setting was silently disabling the comet
      // and the scroll reveals
      const reduced = false;

      const IN_ICON = `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>`;
      const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

      // ---- time helpers: everything measured in fractional months ----
      const now = new Date();
      const NOW_M = now.getFullYear() * 12 + now.getMonth() + (now.getDate() - 1) / 30;
      const ym = str => {
        const [y, m, d] = str.split("-").map(Number);
        return y * 12 + (m - 1) + (d ? (d - 1) / 30 : 0);
      };
      const fmtDay = str => {
        const [y, m, d] = str.split("-").map(Number);
        return `${MONTHS[m - 1]} ${d}, ${y}`;
      };
      const fmtMonth = str => {
        const [y, m] = str.split("-").map(Number);
        return `${MONTHS[m - 1]} ${y}`;
      };
      const spanDates = s => {
        const a = fmtMonth(s.start);
        if (s.endFuture) return `${a} → ${fmtMonth(s.endFuture)} (expected)`;
        return s.end ? `${a} → ${fmtMonth(s.end)}` : `${a} → present`;
      };

      // the GT era (Aug 2022 →) runs at full resolution; earlier years are compressed
      const BREAK_M = ym("2022-08");

      let mode = "professional";
      let state = null;

      function build() {
        wrap.innerHTML = "";
        const W = wrap.clientWidth;
        const mobile = W < 660;

        // ---- items for this mode: LinkedIn embeds live on the professional
        // view, news + featured entries go wherever their g: field says
        // (default service); all link back to their tab on the news page ----
        const extras = [...NEWS.map(n => ({ kind: "news", date: n.d, g: n.g, n })),
          ...FEATURED.map(f => ({ kind: "feat", date: f.d, g: f.g, f }))].filter(it => it.date);
        const rawItems = mode === "professional"
          ? [...TL_POSTS.map(p => ({ kind: "post", date: p.date, p })),
             ...extras.filter(it => it.g === "professional")]
          : extras.filter(it => it.g !== "professional");

        const activeSpans = TL_SPANS.filter(s => s.group === mode);
        // ignition is fixed at the start of high school; anything older
        // (middle-school clippings…) docks on a dashed tail below the node
        const OLDEST_M = ym("2018-08");

        const PXM_OLD = mobile ? 7 : 9;     // px per month, pre-GT (compressed)
        // estH tracks the post-card height (thumb aspect ratio is set in
        // assets/style.css under .tl-post-thumb) — update it if you change it
        const estH = mode === "professional" ? (mobile ? 265 : 245) : 128;
        let PXM = mobile ? 26 : (mode === "professional" ? 50 : 36);
        if (mobile) {
          // single-column cards are tall — stretch the spine so they
          // fit beside it instead of dangling past ignition
          const need = rawItems.reduce((s, it) => s + (it.kind === "post" ? 283 : 146), 0) + 240;
          PXM = Math.max(PXM, (need - (BREAK_M - OLDEST_M) * PXM_OLD - 150) / (NOW_M - BREAK_M));
        }
        const TOP_PAD = 56, BOT_PAD = 90;
        const yFor = m => m >= BREAK_M
          ? TOP_PAD + (NOW_M - m) * PXM
          : TOP_PAD + (NOW_M - BREAK_M) * PXM + (BREAK_M - m) * PXM_OLD;
        let bottomY = yFor(OLDEST_M) + BOT_PAD;

        // ---- lanes for the active group (interval partitioning) ----
        // lanes: interval partitioning per column group (col: overrides cat,
        // letting short stints share the industry column) — every group keeps
        // its own vertical column(s)
        const CAT_ORDER = ["industry", "research", "education", "community"];
        const groupKey = s => s.col || s.cat;
        const spans = [...activeSpans].sort((a, b) =>
          CAT_ORDER.indexOf(groupKey(a)) - CAT_ORDER.indexOf(groupKey(b)) || ym(a.start) - ym(b.start));
        let laneBase = 0, curKey = null, catEnds = [];
        const laneKeys = [];
        for (const s of spans) {
          if (groupKey(s) !== curKey) { laneBase += catEnds.length; curKey = groupKey(s); catEnds = []; }
          s._sM = ym(s.start);
          s._eM = s.end ? ym(s.end) : NOW_M;
          let li = catEnds.findIndex(end => end <= s._sM);
          if (li === -1) { li = catEnds.length; catEnds.push(0); }
          catEnds[li] = s._eM + 0.5;
          s._lane = laneBase + li;
          laneKeys[s._lane] = curKey;
        }
        const nLanes = laneBase + catEnds.length;

        // sides: education hugs the spine on the right (innermost), the
        // shared industry column sits outside it; research goes left;
        // community alternates
        const rightQ = [], leftQ = [];
        for (let ln = 0; ln < nLanes; ln++) {
          const k = laneKeys[ln];
          if (k === "education") rightQ.unshift(ln);
          else if (k === "industry") rightQ.push(ln);
          else if (k === "research") leftQ.push(ln);
          else (rightQ.length <= leftQ.length ? rightQ : leftQ).push(ln);
        }
        const barW = mobile ? 7 : 13, barGap = mobile ? 5 : 9;

        // ---- geometry: spine dead center (desktop), bars flanking it.
        // On the right, a dedicated label gutter (LABEL_GUT) sits between
        // the bars and the cards — object labels live there, tethered to
        // their bars, overlapping neither ----
        let spineX, laneX, bandR, bandL;
        if (mobile) {
          spineX = 24 + nLanes * (barW + barGap) + 18;
          laneX = i => 24 + i * (barW + barGap);
          bandR = bandL = 0;
        } else {
          spineX = Math.round(W / 2);
          laneX = i => {
            const r = rightQ.indexOf(i);
            if (r !== -1) return spineX + 16 + r * (barW + barGap);
            return spineX - 16 - barW - leftQ.indexOf(i) * (barW + barGap);
          };
          bandR = 16 + Math.max(rightQ.length, 1) * (barW + barGap);
          bandL = 16 + Math.max(leftQ.length, 1) * (barW + barGap);
        }
        const LABEL_GUT = 150;
        let cardXL, cardWL, cardXR, cardWR;
        if (mobile) {
          cardXR = spineX + 22; cardWR = W - cardXR;
          cardXL = 0; cardWL = 0;
        } else {
          // equal card widths on both sides — the spine shifts off-center
          // to absorb the label gutter on the right
          const leftGut = bandL + 150;            // semester labels + elbow lanes
          const rightGut = bandR + LABEL_GUT + 16;
          const CW = Math.round(Math.min((W - leftGut - rightGut) / 2, 280)); // ⚙ embed width cap
          cardWL = cardWR = CW;
          cardXL = Math.round((W - 2 * CW - leftGut - rightGut) / 2);
          spineX = cardXL + CW + leftGut;
          cardXR = spineX + rightGut;
        }

        const el = (cls, styles) => {
          const d = document.createElement("div");
          d.className = cls;
          Object.assign(d.style, styles);
          wrap.appendChild(d);
          return d;
        };

        // ---- spine: track, flown-path fill, comet, caps ----
        const trackTop = TOP_PAD, trackBottom = bottomY - 34;
        el("tl-track", { left: spineX + "px", top: trackTop + "px", height: (trackBottom - trackTop) + "px" });
        const progress = el("tl-progress", { left: spineX + "px" });
        const comet = reduced ? null : el("tl-comet", { left: spineX + "px", top: trackTop + "px" });

        // sits just above the top of the track so it never covers a bar
        const capNow = el("tl-cap pulse", { left: spineX + "px", top: (trackTop - 30) + "px" });
        capNow.textContent = "now";
        el("tl-dot lit", { left: spineX + "px", top: trackBottom + "px" });   // the bottom node
        const capEnd = el("tl-cap", { left: spineX + "px", top: (trackBottom + 24) + "px" });
        capEnd.textContent = "ignition · " + Math.floor(OLDEST_M / 12);

        // ---- year pills + semester dashes on the spine ----
        const chapterYears = new Set(TL_CHAPTERS.map(c => c.year));
        const nowYear = now.getFullYear();
        const dashHalf = mobile ? 34 : Math.max(bandR, bandL) + 24;
        for (let y = Math.ceil(OLDEST_M / 12); y <= nowYear; y++) {
          if (!chapterYears.has(String(y)) && y * 12 <= NOW_M) {
            const pill = el("tl-year-pill", { left: spineX + "px", top: yFor(y * 12) + "px" });
            pill.textContent = y;
          }
          // dashed semester boundaries: May starts summer, Aug starts fall
          for (const [mm, name] of [[4, "summer"], [7, "fall"]]) {
            const m = y * 12 + mm;
            if (m > NOW_M || m < OLDEST_M) continue;
            const sy = yFor(m);
            el("tl-sem", { left: (spineX - dashHalf) + "px", width: (dashHalf * 2) + "px", top: sy + "px" });
            if (m >= BREAK_M && !mobile) {
              // labels sit on the LEFT of the dash — the right side is
              // reserved for the object-label gutter
              const lab = el("tl-sem-label", {
                left: (spineX - dashHalf - 8) + "px", top: sy + "px",
                transform: "translate(-100%, -50%)"
              });
              lab.textContent = name;
            }
          }
        }

        // ---- chapter pills (gold years) ----
        for (const c of TL_CHAPTERS) {
          const cy = yFor(ym(c.date));
          const pill = el("tl-chapter-pill", { left: spineX + "px", top: cy + "px" });
          pill.innerHTML = `<span>${c.year}</span>`;
          if (c.caption) {
            const cap = el("tl-chapter-cap", { left: spineX + "px", top: (cy + 26) + "px" });
            cap.textContent = c.caption;
          }
        }

        // ---- experience bars + logos + chips for brief stints ----
        // compute rects first; a min-height bar must not spill onto the next
        // older stint sharing its lane (e.g. Camp Ramah right after PCMP)
        for (const s of spans) {
          s._yTop = Math.max(yFor(s._eM), TOP_PAD - 4);
          s._h = Math.max(yFor(s._sM) - s._yTop, 30);
        }
        const byLane = {};
        for (const s of spans) (byLane[s._lane] = byLane[s._lane] || []).push(s);
        for (const lane of Object.values(byLane)) {
          lane.sort((a, b) => a._yTop - b._yTop);
          for (let i = 0; i + 1 < lane.length; i++) {
            if (lane[i]._yTop + lane[i]._h > lane[i + 1]._yTop - 3) {
              lane[i]._h = Math.max(lane[i + 1]._yTop - 3 - lane[i]._yTop, 14);
            }
          }
        }
        const setTipData = (n, s) => {
          n.dataset.tipTitle = s.role;
          n.dataset.tipDates = spanDates(s);
          n.dataset.tipLogo = s.logo || "";
          n.dataset.tipUrl = s.url || "";
        };
        const chipQueue = [];
        for (const s of spans) {
          const yTop = s._yTop, h = s._h;
          const brief = h < 130;
          const x = laneX(s._lane);
          const bar = el(
            `tl-bar tl-cat-${s.cat}` + (s.end && !s.endFuture ? "" : " ongoing") + (brief ? " brief" : ""),
            { left: x + "px", top: yTop + "px", width: barW + "px", height: h + "px" }
          );
          const logoImg = s.logo ? `<img src="${s.logo}" alt="" loading="lazy" onerror="this.remove()">` : "";
          const wantChip = !mobile && (brief || s.chip);   // chip: true forces a gutter label
          if (!mobile) bar.innerHTML = `<span class="tl-org-logo">${s.name[0]}${logoImg}</span>`;
          if (!mobile && !brief && !wantChip) bar.innerHTML += `<span class="bar-label">${s.name}</span>`;
          setTipData(bar, s);
          if (wantChip) chipQueue.push({ s, x, yTop, h, logoImg, right: x >= spineX });
        }

        // ---- timeline-object labels (chips): stacked in the gutter on
        // their bar's side of the spine, each tethered to its bar
        // (tethers drawn into the connector SVG below) ----
        const chipXR = spineX + bandR + 14;
        const chipXL = spineX - bandL - 14;
        const chipLinks = [];
        for (const onRight of [true, false]) {
          const list = chipQueue.filter(q => q.right === onRight)
            .sort((a, b) => (a.yTop + a.h / 2) - (b.yTop + b.h / 2));
          let prevChipBottom = -1e9;
          for (const q of list) {
            const cy = Math.max(q.yTop + q.h / 2, prevChipBottom + 72);  // tall chips
            prevChipBottom = cy;
            const chip = el(`tl-chip tl-cat-${q.s.cat}`, {
              top: cy + "px",
              left: (onRight ? chipXR : chipXL) + "px",
              transform: onRight ? "translateY(-50%)" : "translate(-100%, -50%)"
            });
            chip.innerHTML = `${q.logoImg}<span>${q.s.name}</span>`;
            setTipData(chip, q.s);
            chipLinks.push({
              x: onRight ? q.x + barW + 1 : q.x - 1,
              y: q.yTop + q.h / 2, cy, right: onRight
            });
          }
        }

        // ---- items: dots + cards, each placed at its true date so the
        // connector can run straight & horizontal; a card only slides
        // down when its side is genuinely occupied (dense clusters) ----
        function cardHTML(it) {
          if (it.kind === "post") {
            // card shows just the post's first photo (see data/timeline.js
            // for where the image files live); clicking expands the full
            // LinkedIn embed in a centered overlay
            const img = it.p.img
              ? `<img src="${it.p.img}" alt="" loading="lazy"
                   onerror="this.parentElement.classList.add('placeholder'); this.remove();">`
              : "";
            return `
              <div class="tl-date">${IN_ICON}${fmtDay(it.p.date)}</div>
              <div class="tl-post-thumb${it.p.img ? "" : " placeholder"}">${img}
                <span class="post-ph">${IN_ICON}<span>Add this post's photo to<br>assets/posts/</span></span>
              </div>
              <div class="tl-card-foot"><span class="foot-title">${it.p.title}</span>
                <a href="${it.p.url}" target="_blank" rel="noopener">open</a></div>`;
          }
          const isNews = it.kind === "news";
          const d = isNews ? it.n : it.f;
          const img = d.img
            ? `<span class="mini-thumb"><img src="${d.img}" alt="" loading="lazy" onerror="this.parentElement.remove()"></span>`
            : "";
          const title = isNews ? d.title : d.desc;
          const desc = isNews ? `<span class="mini-desc">${d.desc}</span>` : "";
          const meta = isNews
            ? `<span class="outlet">${d.outlet}</span> · ${d.date} · in the news →`
            : `<span class="outlet">${d.platform} ${d.title}</span> · ${d.date} · in the wild →`;
          return `${img}<span class="mini-body">
              <span class="mini-title">${title}</span>${desc}
              <span class="mini-meta">${meta}</span>
            </span>`;
        }

        // pre-ignition items (older than high school) dock on a dashed tail
        // just below the ignition node instead of stretching the timeline
        let preDockY = trackBottom + 56;
        const items = rawItems
          .map(it => ({ ...it, _m: ym(it.date), pre: ym(it.date) < OLDEST_M }))
          .sort((a, b) => b._m - a._m)
          .map(it => ({ ...it, dotY: it.pre ? (preDockY += 30) - 30 : yFor(it._m) }))
          .sort((a, b) => a.dotY - b.dotY);
        if (preDockY > trackBottom + 56) {
          const preBottom = preDockY - 30;
          el("tl-track-pre", {
            left: (spineX - 1) + "px",
            top: (trackBottom + 6) + "px",
            height: (preBottom - trackBottom - 6) + "px"
          });
          if (preBottom + 80 > bottomY) bottomY = preBottom + 80;
        }

        // create + measure every card first (with its real classes on, so
        // padding/flex are included in the measured height)
        for (const it of items) {
          const mini = it.kind !== "post";
          const card = document.createElement(mini ? "a" : "div");
          if (mini) card.href = it.kind === "news" ? "news.html" : "news.html#featured";
          card.className = `tl-card${mini ? " mini" : ""} side-r`;
          card.style.width = cardWR + "px";        // measure at final-ish width
          card.innerHTML = cardHTML(it);
          wrap.appendChild(card);
          it.mini = mini;
          it.card = card;
          it.h = card.offsetHeight || estH;
          it.anchorOff = mini ? it.h / 2 : 22;     // connector meets minis mid-card
        }

        // ---- placement: every card wants its connector anchor exactly at
        // its dot. Per side, overlapping neighbors merge into a cluster that
        // centers on its members' dates (cards may shift up OR down), so
        // spacing stays true to the calendar instead of a fixed stack ----
        const GAP = 16;
        function placeSide(list) {
          const clusters = [];
          for (const e of list) {
            clusters.push({ items: [e], offs: [0], totalH: e.h, desire: e.ideal });
            while (clusters.length > 1) {
              const b = clusters[clusters.length - 1], a = clusters[clusters.length - 2];
              if (b.desire / b.items.length >= a.desire / a.items.length + a.totalH + GAP) break;
              a.desire += b.desire - b.items.length * (a.totalH + GAP);
              for (let k = 0; k < b.items.length; k++) {
                a.offs.push(b.offs[k] + a.totalH + GAP);
                a.items.push(b.items[k]);
              }
              a.totalH += GAP + b.totalH;
              clusters.pop();
            }
          }
          // final pass keeps clusters in order and clear of the top edge
          let minTop = 2;
          for (const c of clusters) {
            const top0 = Math.max(c.desire / c.items.length, minTop);
            c.items.forEach((e, k) => { e.top = top0 + c.offs[k]; });
            minTop = top0 + c.totalH + GAP;
          }
        }

        function evalSides(sides) {
          const entries = items.map((it, i) => ({ ideal: it.dotY - it.anchorOff, h: it.h, i }));
          const lists = { r: [], l: [] };
          entries.forEach((e, i) => lists[sides[i]].push(e));
          placeSide(lists.r);
          placeSide(lists.l);
          const tops = []; let elbows = 0, sumSq = 0, lowest = 0;
          for (const e of entries) {
            tops[e.i] = e.top;
            const d = e.top - e.ideal;
            if (Math.abs(d) >= 1.5) elbows++;
            sumSq += d * d;
            lowest = Math.max(lowest, e.top + e.h);
          }
          return { tops, elbows, sumSq, lowest };
        }

        // pick the left/right pattern that keeps the most connectors
        // horizontal, spreading any leftover displacement evenly
        // (exhaustive — trivial at this scale)
        let sides, res;
        if (mobile) {
          sides = items.map(() => "r");
          res = evalSides(sides);
        } else if (items.length <= 15) {
          let best = null;
          for (let mask = 0; mask < (1 << items.length); mask++) {
            const cand = items.map((_, i) => ((mask >> i) & 1) ? "l" : "r");
            const r = evalSides(cand);
            const nl = cand.filter(s => s === "l").length;
            r.imb = Math.abs(items.length - 2 * nl);
            if (!best || r.elbows < best.elbows ||
              (r.elbows === best.elbows && r.sumSq < best.sumSq - 0.5) ||
              (r.elbows === best.elbows && Math.abs(r.sumSq - best.sumSq) <= 0.5 && r.imb < best.imb)) {
              best = r; sides = cand;
            }
          }
          res = best;
        } else {
          sides = items.map((_, i) => (i % 2 ? "l" : "r"));
          res = evalSides(sides);
        }

        const frag = items.map((it, i) => {
          const side = sides[i], top = res.tops[i];
          it.card.className = `tl-card${it.mini ? " mini" : " post"} side-${side}` + (reduced ? "" : " tl-hidden");
          it.card.dataset.ci = i;   // links the card to its dot + connector
          it.card.style.left = (side === "r" ? cardXR : cardXL) + "px";
          it.card.style.width = (side === "r" ? cardWR : cardWL) + "px";
          it.card.style.top = top + "px";
          if (!it.mini) it.card.addEventListener("click", e => {
            if (e.target.closest("a")) return;      // let the footer link work
            openPost(it.p, it.card);
          });
          const dot = el(`tl-dot c${i}` + (reduced ? "" : " hid"), { left: spineX + "px", top: it.dotY + "px" });
          return { ...it, i, side, dot, anchorY: top + it.anchorOff };
        });
        if (res.lowest + 60 > bottomY) bottomY = res.lowest + 60;
        wrap.style.height = bottomY + "px";

        // ---- connectors: strictly horizontal + vertical segments. A card
        // sitting at its dot gets one horizontal line; a displaced card gets
        // a squared elbow, each in its own vertical lane ----
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "tl-connectors");
        svg.setAttribute("width", W);
        svg.setAttribute("height", bottomY);
        let paths = "";
        const elbowIdx = { r: 0, l: 0 };
        for (const it of frag) {
          const cls = `c${it.i}` + (reduced ? "" : " hid");   // revealed with its card
          const x1 = spineX + (it.side === "r" ? 6 : -6);
          const x2 = it.side === "r" ? cardXR - 2 : cardXL + cardWL + 2;
          if (Math.abs(it.anchorY - it.dotY) < 1.5) {
            paths += `<path class="${cls}" d="M ${x1} ${it.dotY} L ${x2} ${it.dotY}"/>`;
          } else {
            // vertical elbow lanes hug the cards, past the label gutter on
            // the right and past the semester labels on the left, so lines
            // never cross chips or text
            const vx = it.side === "r"
              ? Math.min(cardXR - 22 + (elbowIdx.r++ % 3) * 7, cardXR - 8)
              : Math.max(spineX - dashHalf - 46 - (elbowIdx.l++ % 3) * 8, cardXL + cardWL + 8);
            paths += `<path class="${cls}" d="M ${x1} ${it.dotY} L ${vx} ${it.dotY} L ${vx} ${it.anchorY} L ${x2} ${it.anchorY}"/>`;
          }
          paths += `<circle class="${cls}" cx="${x2}" cy="${it.anchorY}" r="2" fill="rgba(95,208,245,0.5)" stroke="none"/>`;
        }
        // label tethers: bar → chip in the gutter (H-V-H, in the slim
        // corridor between the band and the chips)
        for (const c of chipLinks || []) {
          const vx = c.right ? spineX + bandR + 6 : spineX - bandL - 6;
          const endX = c.right ? chipXR - 3 : chipXL + 3;
          paths += `<path class="lbl" d="M ${c.x} ${c.y} L ${vx} ${c.y} L ${vx} ${c.cy} L ${endX} ${c.cy}"/>`;
        }
        svg.innerHTML = paths;
        wrap.appendChild(svg);

        state = {
          trackTop, trackBottom, progress, comet,
          dots: frag.map(f => ({ y: f.dotY, elDot: f.dot }))
        };

        // reveal each card on approach, together with its dot + connector
        // (bars are always plotted — a scale transform would collapse
        // their observed box to the origin point)
        const io = new IntersectionObserver(es => {
          for (const e of es) {
            if (!e.isIntersecting) continue;
            e.target.classList.remove("tl-hidden");
            if (e.target.dataset.ci !== undefined) {
              wrap.querySelectorAll(`.c${e.target.dataset.ci}`).forEach(n => n.classList.remove("hid"));
            }
            io.unobserve(e.target);
          }
        }, { threshold: 0.05, rootMargin: "0px 0px -8% 0px" });
        wrap.querySelectorAll(".tl-card").forEach(n => io.observe(n));

        onScroll();
      }

      // ---- post modal: clicking a card expands the full LinkedIn embed
      // from the card to the center of the screen; clicking the backdrop
      // (or pressing Escape) animates it back away ----
      let modalClose = null;
      function openPost(p, cardEl) {
        if (modalClose) modalClose(true);
        const back = document.createElement("div");
        back.className = "tl-modal-back";
        const box = document.createElement("div");
        box.className = "tl-modal-box";
        box.innerHTML = `
          <div class="tl-date">${IN_ICON}${fmtDay(p.date)}</div>
          <div class="tl-modal-embed"><iframe src="https://www.linkedin.com/embed/feed/update/${p.urn}"
            title="LinkedIn post: ${p.title}" allowfullscreen></iframe></div>
          <div class="tl-card-foot"><span class="foot-title">${p.title}</span>
            <a href="${p.url}" target="_blank" rel="noopener">open on LinkedIn</a></div>`;
        document.body.append(back, box);

        // FLIP: start at the card's on-screen rect, settle in the center
        const MW = Math.min(620, window.innerWidth * 0.94);
        const MH = Math.min(window.innerHeight * 0.88, 780);
        box.style.width = MW + "px";
        box.style.height = MH + "px";
        box.style.left = (window.innerWidth - MW) / 2 + "px";
        box.style.top = (window.innerHeight - MH) / 2 + "px";
        const r = cardEl.getBoundingClientRect();
        const fromT = `translate(${(r.left + r.width / 2) - window.innerWidth / 2}px,
          ${(r.top + r.height / 2) - window.innerHeight / 2}px)
          scale(${r.width / MW}, ${r.height / MH})`;
        box.style.transform = fromT;
        box.getBoundingClientRect();          // flush styles before animating
        back.classList.add("open");
        box.classList.add("open");
        box.style.transform = "";
        document.body.style.overflow = "hidden";

        const onKey = e => { if (e.key === "Escape") close(); };
        function close(instant) {
          document.removeEventListener("keydown", onKey);
          document.body.style.overflow = "";
          modalClose = null;
          if (instant) { back.remove(); box.remove(); return; }
          box.style.transform = fromT;
          box.classList.remove("open");
          back.classList.remove("open");
          setTimeout(() => { back.remove(); box.remove(); }, 340);
        }
        back.addEventListener("click", () => close());
        document.addEventListener("keydown", onKey);
        modalClose = close;
      }

      // ---- scroll-driven ascent ----
      // The comet's journey maps to the whole page scroll: at the top of the
      // page it has arrived at "now"; scrolled fully down it sits on the
      // ignition node. Its flown path (the gold-to-cyan fill) trails below.
      function onScroll() {
        if (!state) return;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const f = maxScroll > 0 ? Math.min(Math.max(window.scrollY / maxScroll, 0), 1) : 0;
        const cometY = reduced ? state.trackTop : state.trackTop + f * (state.trackBottom - state.trackTop);
        if (state.comet) state.comet.style.top = cometY + "px";
        state.progress.style.top = cometY + "px";
        state.progress.style.height = (state.trackBottom - cometY) + "px";
        for (const d of state.dots) d.elDot.classList.toggle("lit", reduced || d.y >= cometY - 4);
      }

      // ---- professional ↔ service toggle ----
      document.querySelectorAll("#tl-mode .seg-btn").forEach(btn =>
        btn.addEventListener("click", () => {
          if (btn.dataset.mode === mode) return;
          mode = btn.dataset.mode;
          document.querySelectorAll("#tl-mode .seg-btn").forEach(b => b.classList.toggle("active", b === btn));
          document.querySelectorAll("#tl-legend .key").forEach(k =>
            k.classList.toggle("off", k.dataset.group !== mode));
          build();
        }));

      // ---- tooltip for bars & chips (logo, role, dates, site link):
      // hover shows it and moving away hides it; CLICKING a bar or chip
      // pins it until you click anywhere else on the page ----
      let tipTarget = null, tipPinned = false;
      function showTip(t, pageX, pageY) {
        const logo = t.dataset.tipLogo
          ? `<img class="tip-logo" src="${t.dataset.tipLogo}" alt="" onerror="this.remove()">` : "";
        const link = t.dataset.tipUrl
          ? `<div class="tip-link"><a href="${t.dataset.tipUrl}" target="_blank" rel="noopener">visit site</a></div>` : "";
        tip.innerHTML = `<div class="tip-head">${logo}<span>${t.dataset.tipTitle}</span></div>
          <span class="tip-dates">${t.dataset.tipDates}</span>${link}`;
        tip.classList.add("show");
        const tw = tip.offsetWidth;
        tip.style.left = Math.min(pageX + 14, window.scrollX + window.innerWidth - tw - 14) + "px";
        tip.style.top = (pageY + 14) + "px";
      }
      function hideTip() {
        tip.classList.remove("show");
        tipTarget = null;
      }
      wrap.addEventListener("mousemove", e => {
        if (tipPinned) return;
        const t = e.target.closest(".tl-bar, .tl-chip");
        if (t && t !== tipTarget) { tipTarget = t; showTip(t, e.pageX, e.pageY); }
        else if (!t && tipTarget) hideTip();
      });
      wrap.addEventListener("mouseleave", () => { if (!tipPinned) hideTip(); });
      document.addEventListener("click", e => {
        const t = e.target.closest(".tl-bar, .tl-chip");
        if (t) {
          tipPinned = true;
          tipTarget = t;
          showTip(t, e.pageX, e.pageY);
        } else if (!e.target.closest("#tl-tip")) {
          tipPinned = false;
          hideTip();
        }
      });

      window.addEventListener("scroll", onScroll, { passive: true });
      let rw = null;
      window.addEventListener("resize", () => { clearTimeout(rw); rw = setTimeout(build, 150); });
      build();
    })();
  </script>
  <script src="assets/site.js"></script>
</body>

</html>
